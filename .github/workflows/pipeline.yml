name: Terrobook Portal Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Collect
        run: python -m src collect

      - name: Curate
        run: python -m src curate

      - name: Generate
        run: python -m src generate

      - name: Diagnóstico
        run: |
          echo "=== data/curated/ ===" && ls data/curated/ 2>/dev/null | wc -l | xargs echo "Aprovados:"
          echo "=== data/pending_review/ ===" && ls data/pending_review/ 2>/dev/null | wc -l | xargs echo "Pendentes:"
          echo "=== site/ ===" && ls -lh site/ || echo "VAZIO"

      - name: Commitar dados persistentes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/curated/ data/pending_review/ data/seen_urls.json reports/ || true
          git diff --staged --quiet || git commit -m "chore: atualiza dados curados [skip ci]"
          git push || true

      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true

  report:
    runs-on: ubuntu-latest
    needs: pipeline
    if: always()
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
      - name: Relatórios
        run: ls -lh reports/ 2>/dev/null || echo "Nenhum relatório."
